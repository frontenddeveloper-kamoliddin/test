<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="shortcut icon" href="./duloloq.png" type="image/x-icon">
  <style>
    .batafsil-qarzdorliklar {
      max-height: 400px; 
      overflow-y: auto; 
    }
   
    .batafsil-modal {
      max-height: 70vh;   
      overflow-y: auto;   
      padding: 16px;     
      background: #f5f6fa !important;
    }
    html.dark .batafsil-modal {
      background: #232c39 !important;
    }
    
    .loader {
      width: 50px;
      aspect-ratio: 1;
      display: grid;
      border-radius: 50%;
      background:
        linear-gradient(0deg ,rgba(255, 252, 252, 0.5) 30%,#0000 0 70%,rgb(255, 249, 249) 0) 50%/8% 100%,
        linear-gradient(90deg,rgba(255, 238, 238, 0.25) 30%,#0000 0 70%,rgba(255, 255, 255, 0.75) 0) 50%/100% 8%;
      background-repeat: no-repeat;
      animation: l23 1s infinite steps(12);
    }
    .loader::before,
    .loader::after {
       content: "";
       grid-area: 1/1;
       border-radius: 50%;
       background: inherit;
       opacity: 0.915;
       transform: rotate(30deg);
    }
    .loader::after {
       opacity: 0.83;
       transform: rotate(60deg);
    }
    @keyframes l23 {
      100% {transform: rotate(1turn)}
    }
    
    /* Glassmorphism styles */
    .glass-card {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
    }
    
    .glass-input {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #333;
    }
    
    .glass-input::placeholder {
      color: #666;
    }
    
    .glass-button {
      background: rgba(34, 197, 94, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(34, 197, 94, 0.3);
      transition: all 0.3s ease;
    }
    
    .glass-button:hover {
      background: rgba(34, 197, 94, 0.9);
      transform: translateY(-2px);
    }
    
    .glass-button.red {
      background: rgba(239, 68, 68, 0.8);
      border-color: rgba(239, 68, 68, 0.3);
    }
    
    .glass-button.red:hover {
      background: rgba(239, 68, 68, 0.9);
    }
    
    /* Sidebar specific styles */
    .sidebar-button {
      background: rgba(34, 197, 94, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(34, 197, 94, 0.3);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    
    .sidebar-button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s;
    }
    
    .sidebar-button:hover::before {
      left: 100%;
    }
    
    .sidebar-button:hover {
      background: rgba(34, 197, 94, 0.9);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(34, 197, 94, 0.3);
    }
    
    .sidebar-button:active {
      transform: translateY(0);
    }
    
    /* User ID styling */
    .user-id-container {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.1));
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
    }
    
    .user-id-container:hover {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0.2));
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
    }
    
    .user-code {
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
      letter-spacing: 2px;
      font-weight: 700;
    }
    
    .user-avatar {
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
      transition: all 0.3s ease;
    }
    
    .user-avatar:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
    }
    
    .stat-card {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      transition: all 0.3s ease;
    }
    
    .stat-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.4);
    }
    
    .stat-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 10px;
    }
  </style>
</head>
<body class="min-h-screen" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);">

    <!-- New Debtor Form Card -->

      <div class="glass-card rounded-2xl p-6">
        <div class="flex items-center mb-6">

          <h3 class="text-xl font-bold text-gray-800">Yangi qarzdor qo'shish</h3>
        </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Ism *</label>
              <input id="debtorName" type="text" placeholder="Qarzdor ismi" required class="w-full glass-input p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Mahsulot</label>
              <input id="debtorProduct" type="text" placeholder="Mahsulot nomi" class="w-full glass-input p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Soni</label>
              <input id="debtorCount" type="number" placeholder="Mahsulot soni" class="w-full glass-input p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Narxi *</label>
              <input id="debtorPrice" type="number" min="1" placeholder="Mahsulot narxi" required class="w-full glass-input p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>
          </div>
          
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Qo'shimcha izoh</label>
            <input id="debtorNote" type="text" placeholder="Qo'shimcha ma'lumot (ixtiyoriy)" class="w-full glass-input p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
          </div>

            </svg>
            <span>+ Qarzdor qo'shish</span>
          </button>

      <div class="flex-1 stat-card rounded-2xl p-6 text-center">

  <!-- Enhanced Debtor Details Modal -->
  <div id="debtorModal" class="fixed inset-0 z-40 flex items-center justify-center bg-black bg-opacity-60 backdrop-blur-sm hidden">
    <div class="glass-card rounded-3xl shadow-2xl w-full max-w-2xl mx-4 relative batafsil-modal border border-white/20">

            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">

  <!-- Enhanced My Debts Modal -->
